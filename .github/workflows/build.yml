name: 🏗️ بناء LATCHI IPTV لويندوز

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    name: 🪟 ويندوز
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: ⚙️ إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 تثبيت الاعتماديات
        run: npm ci

      - name: 🏗️ بناء التطبيق
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 📤 رفع كمادة خام
        uses: actions/upload-artifact@v4
        with:
          name: LATCHI-IPTV-Windows
          path: dist/*.exe
          retention-days: 30

      - name: 🚀 إنشاء Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
