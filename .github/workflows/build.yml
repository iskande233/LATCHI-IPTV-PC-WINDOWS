name: 🏗️ بناء LATCHI IPTV لويندوز

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    name: 🪟 ويندوز
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: ⚙️ إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت الاعتماديات
        run: npm install
        shell: bash

      - name: 🏗️ بناء التطبيق
        run: npm run build:win
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 🔍 عرض ملفات الـ dist
        run: ls -la dist/
        shell: bash

      - name: 📤 رفع الـ EXE كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LATCHI-IPTV-Windows-Setup
          path: dist/*.exe
          retention-days: 90
          if-no-files-found: error

      - name: 🚀 رفع للـ Release (عند tag فقط)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          name: LATCHI IPTV ${{ github.ref_name }}
          body: |
            ## 🎉 LATCHI IPTV للحاسوب

            ### ⚙️ طريقة التثبيت:
            1. حمّل ملف `LATCHI-IPTV-Setup-*.exe`
            2. شغّله واتبع خطوات التثبيت
            3. افتح التطبيق — يشتغل مباشرة ✅
          token: ${{ secrets.GITHUB_TOKEN }}
